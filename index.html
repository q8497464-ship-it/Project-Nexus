<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Couples Truth & Dare</title>
    
    <!-- Progressive Web App (PWA) Mobile Head Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexus Pairs" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#05050e" />
    
    <!-- Link Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=192&h=192&fit=crop&q=80" />
    
    <script>
      (function() {
        try {
          var origFetch = window.fetch;
          var customFetch = origFetch;
          if (origFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() {
                return customFetch;
              },
              set: function(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Could not make fetch writable via getter/setter:", e);
        }
      })();
    </script>
  </head>
  <body class="bg-[#05050e] text-zinc-100 select-none overflow-x-hidden antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Clear Old Cache and Service Workers to Prevent Stale Locked Screens -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister().then(function(success) {
              if (success) console.log('[Service Worker] Successfully unregistered.');
            });
          }
        }).catch(function(err) {
          console.warn('Error unregistering service workers:', err);
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(keys) {
          keys.forEach(function(key) {
            caches.delete(key).then(function() {
              console.log('[Cache] Stale cache cleared:', key);
            });
          });
        });
      }
    </script>
  </body>
</html>
